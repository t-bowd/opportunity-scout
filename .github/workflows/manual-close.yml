name: Manual Close Positions

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers to close at market (e.g. YUMC FLUT)"
        required: true
        type: string

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Close named positions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m paper_trader.manual_close ${{ inputs.tickers }}
