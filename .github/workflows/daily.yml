name: Daily Collection

on:
  schedule:
    # 16:00 UTC = mid US session (noon ET in summer / 11am ET in winter), always
    # comfortably inside 09:30–16:00 ET even with GitHub Actions' cron lag. Running
    # mid-session means paper entries/exits fill at a live, tradeable price rather
    # than at/after the close — so the paper P&L reflects fills we could actually
    # get. 7 days/week (weekend runs still process news + paper exits).
    - cron: "0 16 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily collection + scoring
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python run_daily.py
